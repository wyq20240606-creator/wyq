<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>送给keai男孩的生日祝福</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: radial-gradient(circle at top, #25114d 0%, #090014 45%, #000 100%);
      color: #fff;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 30%, rgba(255, 0, 153, 0.22), transparent 22%),
        radial-gradient(circle at 80% 20%, rgba(0, 204, 255, 0.18), transparent 25%),
        radial-gradient(circle at 50% 85%, rgba(255, 215, 0, 0.14), transparent 20%);
      filter: blur(30px);
      pointer-events: none;
      z-index: 0;
    }

    .stars, .confetti, .balloons, .floating-hearts {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .stars {
      z-index: 1;
    }

    .confetti, .balloons, .floating-hearts {
      z-index: 4;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(255,255,255,.9);
      animation: twinkle 2s infinite ease-in-out;
      opacity: .5;
    }

    @keyframes twinkle {
      0%, 100% { transform: scale(1); opacity: .3; }
      50% { transform: scale(2.2); opacity: 1; }
    }

    .container {
      position: relative;
      z-index: 3;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: min(920px, 95vw);
      min-height: 560px;
      padding: 36px 28px 30px;
      border-radius: 28px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.16);
      backdrop-filter: blur(18px);
      box-shadow:
        0 0 30px rgba(255, 0, 153, .18),
        0 0 80px rgba(0, 204, 255, .12),
        inset 0 0 35px rgba(255,255,255,.05);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: 30px;
      padding: 2px;
      background: linear-gradient(135deg, #ff4fd8, #7c5cff, #16dbff, #ffe45c);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: .9;
      pointer-events: none;
    }

    .shine {
      position: absolute;
      top: -120%;
      left: -40%;
      width: 40%;
      height: 300%;
      background: linear-gradient(to right, transparent, rgba(255,255,255,.18), transparent);
      transform: rotate(20deg);
      animation: shine 7s linear infinite;
      pointer-events: none;
    }

    @keyframes shine {
      0% { left: -50%; }
      100% { left: 130%; }
    }

    .title {
      font-size: clamp(2.2rem, 6vw, 5rem);
      font-weight: 900;
      letter-spacing: 2px;
      margin-top: 20px;
      margin-bottom: 14px;
      text-shadow:
        0 0 10px rgba(255,255,255,.65),
        0 0 22px rgba(255, 0, 153, .65),
        0 0 44px rgba(0, 204, 255, .45);
      animation: glowTitle 2s ease-in-out infinite alternate;
    }

    @keyframes glowTitle {
      from { transform: translateY(0); filter: brightness(1); }
      to { transform: translateY(-2px); filter: brightness(1.15); }
    }

    .subtitle {
      font-size: clamp(1rem, 2.5vw, 1.35rem);
      color: rgba(255,255,255,.9);
      margin-bottom: 24px;
      line-height: 1.8;
    }

    .name {
      display: inline-block;
      padding: 10px 22px;
      margin: 10px 0 24px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(255,79,216,.22), rgba(22,219,255,.2));
      border: 1px solid rgba(255,255,255,.15);
      font-size: clamp(1.2rem, 3vw, 2rem);
      font-weight: 800;
      box-shadow: 0 0 20px rgba(255,79,216,.15);
    }

    .message {
      width: min(720px, 92%);
      margin: 0 auto 24px;
      font-size: clamp(1rem, 2.2vw, 1.2rem);
      line-height: 2;
      color: rgba(255,255,255,.95);
    }

    .highlight {
      color: #ffe66d;
      text-shadow: 0 0 10px rgba(255,230,109,.6);
      font-weight: 700;
    }

    .btns {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    button {
      border: none;
      cursor: pointer;
      padding: 14px 26px;
      font-size: 1rem;
      font-weight: 700;
      border-radius: 999px;
      transition: all .25s ease;
      color: #fff;
      position: relative;
      overflow: hidden;
    }

    .btn-primary {
      background: linear-gradient(90deg, #ff4fd8, #7c5cff);
      box-shadow: 0 10px 30px rgba(124, 92, 255, .35);
    }

    .btn-secondary {
      background: linear-gradient(90deg, #16dbff, #00b894);
      box-shadow: 0 10px 30px rgba(22, 219, 255, .28);
    }

    button:hover {
      transform: translateY(-3px) scale(1.03);
      filter: brightness(1.08);
    }

    .cake-wrap {
      margin: 24px auto 18px;
      position: relative;
      width: 210px;
      height: 180px;
    }

    .cake {
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 170px;
      height: 100px;
    }

    .layer {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 18px;
      box-shadow: inset 0 -8px 0 rgba(0,0,0,.08), 0 10px 18px rgba(0,0,0,.15);
    }

    .layer1 {
      width: 170px;
      height: 46px;
      bottom: 0;
      background: linear-gradient(180deg, #ff8ac7, #ff5ea8);
    }

    .layer2 {
      width: 132px;
      height: 40px;
      bottom: 34px;
      background: linear-gradient(180deg, #8be9fd, #4cc9f0);
    }

    .icing {
      position: absolute;
      width: 100%;
      height: 12px;
      top: 0;
      left: 0;
      background: #fff3f9;
      border-radius: 18px 18px 12px 12px;
    }

    .drip {
      position: absolute;
      top: 8px;
      width: 16px;
      background: #fff3f9;
      border-radius: 0 0 10px 10px;
    }

    .drip.d1 { left: 20px; height: 18px; }
    .drip.d2 { left: 58px; height: 24px; }
    .drip.d3 { left: 95px; height: 16px; }
    .drip.d4 { left: 126px; height: 22px; }

    .candles {
      position: absolute;
      left: 50%;
      bottom: 74px;
      transform: translateX(-50%);
      display: flex;
      gap: 16px;
    }

    .candle {
      width: 10px;
      height: 38px;
      border-radius: 6px;
      background: repeating-linear-gradient(
        45deg,
        #fff,
        #fff 6px,
        #ffd166 6px,
        #ffd166 12px
      );
      position: relative;
      box-shadow: 0 0 12px rgba(255,255,255,.35);
    }

    .flame {
      position: absolute;
      top: -15px;
      left: 50%;
      transform: translateX(-50%);
      width: 12px;
      height: 18px;
      background: radial-gradient(circle at 50% 35%, #fff8b5 0%, #ffd166 45%, #ff7b00 100%);
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      box-shadow: 0 0 16px rgba(255, 196, 0, .85);
      animation: flicker .18s infinite alternate;
      transform-origin: center bottom;
    }

    @keyframes flicker {
      from { transform: translateX(-50%) rotate(-3deg) scale(1); }
      to { transform: translateX(-50%) rotate(3deg) scale(1.08); }
    }

    .footer-text {
      margin-top: 20px;
      font-size: .96rem;
      color: rgba(255,255,255,.72);
    }

    .balloon {
      position: absolute;
      width: 54px;
      height: 68px;
      border-radius: 50% 50% 45% 45%;
      animation: floatUp linear infinite;
      opacity: .92;
      box-shadow: inset -8px -10px 14px rgba(0,0,0,.12), 0 0 18px rgba(255,255,255,.12);
    }

    .balloon::after {
      content: "";
      position: absolute;
      bottom: -34px;
      left: 50%;
      width: 2px;
      height: 36px;
      background: rgba(255,255,255,.7);
      transform: translateX(-50%);
    }

    .balloon::before {
      content: "";
      position: absolute;
      bottom: -4px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-top: 8px solid rgba(255,255,255,.8);
    }

    @keyframes floatUp {
      0% { transform: translateY(110vh) translateX(0) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      100% { transform: translateY(-140px) translateX(30px) rotate(8deg); opacity: 0; }
    }

    .confetti-piece {
      position: absolute;
      width: 10px;
      height: 18px;
      top: -20px;
      animation: confettiFall linear forwards;
      opacity: .95;
    }

    @keyframes confettiFall {
      0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0.95; }
    }

    .heart {
      position: absolute;
      width: 18px;
      height: 18px;
      transform: rotate(45deg);
      background: rgba(255, 79, 216, .85);
      animation: heartFloat linear infinite;
      filter: drop-shadow(0 0 8px rgba(255,79,216,.4));
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      background: inherit;
      border-radius: 50%;
    }

    .heart::before { left: -9px; }
    .heart::after { top: -9px; }

    @keyframes heartFloat {
      0% { transform: translateY(100vh) rotate(45deg) scale(.8); opacity: 0; }
      10% { opacity: .95; }
      100% { transform: translateY(-20vh) rotate(45deg) scale(1.2); opacity: 0; }
    }

    .music-note {
      position: fixed;
      font-size: 22px;
      color: rgba(255,255,255,.8);
      animation: noteRise 2.6s ease-out forwards;
      pointer-events: none;
      z-index: 4;
      text-shadow: 0 0 10px rgba(255,255,255,.5);
    }

    @keyframes noteRise {
      0% { transform: translateY(0) scale(.8); opacity: 0; }
      20% { opacity: 1; }
      100% { transform: translateY(-120px) translateX(20px) scale(1.35); opacity: 0; }
    }

    @media (max-width: 640px) {
      .card { min-height: auto; padding: 28px 18px 24px; }
      .message { line-height: 1.8; }
      .cake-wrap { transform: scale(.9); margin-top: 14px; }
    }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>
  <div class="balloons" id="balloons"></div>
  <div class="confetti" id="confetti"></div>
  <div class="floating-hearts" id="hearts"></div>

  <div class="container">
    <div class="card">
      <div class="shine"></div>
      <div class="title">🎉 Happy Birthday 🎉</div>
      <div class="subtitle">今天不是普通的一天！是属于你闪闪发光的高光时刻！</div>
      <div class="name" id="nameBox">亲爱的小朋友</div>

      <div class="cake-wrap">
        <div class="candles">
          <div class="candle"><div class="flame"></div></div>
          <div class="candle"><div class="flame"></div></div>
          <div class="candle"><div class="flame"></div></div>
        </div>
        <div class="cake">
          <div class="layer layer2">
            <div class="icing"></div>
            <div class="drip d1"></div>
            <div class="drip d2"></div>
            <div class="drip d3"></div>
          </div>
          <div class="layer layer1">
            <div class="icing"></div>
            <div class="drip d1"></div>
            <div class="drip d2"></div>
            <div class="drip d3"></div>
            <div class="drip d4"></div>
          </div>
        </div>
      </div>

      <div class="message" id="messageText">
        愿你在新的一岁里，<span class="highlight">所行皆坦途，所遇皆温暖，所想皆如愿！</span><br>
        愿你的生活像烟花一样绚烂！像星光一样闪耀！像音乐一样自由热烈！<br>
        今天的快乐，要比昨天更多噢！
      </div>

      <div class="btns">
        <button class="btn-primary" id="celebrateBtn">点这放烟花</button>
        <button class="btn-secondary" id="musicBtn">点这有惊喜</button>
      </div>

      <div class="footer-text">✨ 这份生日祝福，专属于超级可爱的你 ✨</div>
    </div>
  </div>

  <script>
    const stars = document.getElementById('stars');
    const balloons = document.getElementById('balloons');
    const confetti = document.getElementById('confetti');
    const hearts = document.getElementById('hearts');
    const celebrateBtn = document.getElementById('celebrateBtn');
    const musicBtn = document.getElementById('musicBtn');
    const nameBox = document.getElementById('nameBox');

    const birthdayName = '生日快乐！wode星星男孩！';
    nameBox.textContent = birthdayName;

    function createStars(num = 90) {
      for (let i = 0; i < num; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        s.style.left = Math.random() * 100 + 'vw';
        s.style.top = Math.random() * 100 + 'vh';
        s.style.animationDelay = (Math.random() * 2) + 's';
        s.style.animationDuration = (1.5 + Math.random() * 2.5) + 's';
        s.style.opacity = Math.random();
        stars.appendChild(s);
      }
    }

    function launchConfetti(amount = 120) {
      const colors = ['#ff4fd8', '#16dbff', '#ffe45c', '#7c5cff', '#00d084', '#ff8a5b', '#ffffff'];
      for (let i = 0; i < amount; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + 'vw';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.width = (6 + Math.random() * 7) + 'px';
        piece.style.height = (10 + Math.random() * 16) + 'px';
        piece.style.animationDuration = (2.5 + Math.random() * 3) + 's';
        piece.style.animationDelay = (Math.random() * 0.6) + 's';
        piece.style.borderRadius = Math.random() > 0.5 ? '2px' : '50%';
        confetti.appendChild(piece);
        setTimeout(() => piece.remove(), 6500);
      }
    }

    function createBalloon() {
      const colors = [
        'linear-gradient(180deg, #ff7ad9, #ff4fd8)',
        'linear-gradient(180deg, #6ee7ff, #16dbff)',
        'linear-gradient(180deg, #ffe45c, #ffb703)',
        'linear-gradient(180deg, #a78bfa, #7c5cff)',
        'linear-gradient(180deg, #7fffd4, #00b894)'
      ];
      const b = document.createElement('div');
      b.className = 'balloon';
      b.style.left = Math.random() * 100 + 'vw';
      b.style.background = colors[Math.floor(Math.random() * colors.length)];
      b.style.animationDuration = (8 + Math.random() * 6) + 's';
      b.style.transform = `scale(${0.75 + Math.random() * 0.6})`;
      balloons.appendChild(b);
      setTimeout(() => b.remove(), 15000);
    }

    function createHeart() {
      const h = document.createElement('div');
      h.className = 'heart';
      h.style.left = Math.random() * 100 + 'vw';
      h.style.animationDuration = (4 + Math.random() * 5) + 's';
      h.style.opacity = 0.7 + Math.random() * 0.3;
      h.style.transform = `rotate(45deg) scale(${0.7 + Math.random() * 0.8})`;
      hearts.appendChild(h);
      setTimeout(() => h.remove(), 9000);
    }

    function createMusicNotes() {
      const notes = ['♪', '♫', '♬', '♩'];
      for (let i = 0; i < 12; i++) {
        const n = document.createElement('div');
        n.className = 'music-note';
        n.textContent = notes[Math.floor(Math.random() * notes.length)];
        n.style.left = (20 + Math.random() * 60) + 'vw';
        n.style.top = (55 + Math.random() * 20) + 'vh';
        n.style.animationDelay = (i * 0.08) + 's';
        document.body.appendChild(n);
        setTimeout(() => n.remove(), 2800);
      }
    }

    function burstSequence() {
      launchConfetti(160);
      for (let i = 0; i < 8; i++) {
        setTimeout(createBalloon, i * 180);
      }
      for (let i = 0; i < 18; i++) {
        setTimeout(createHeart, i * 120);
      }
    }

    celebrateBtn.addEventListener('click', burstSequence);
    musicBtn.addEventListener('click', () => {
      createMusicNotes();
      launchConfetti(70);
      for (let i = 0; i < 10; i++) {
        setTimeout(createHeart, i * 150);
      }
      alert('🎂 今天的你很耀眼噢！');
    });

    createStars();
    launchConfetti(80);
    setInterval(() => {
      if (document.visibilityState === 'visible') createBalloon();
    }, 1400);
    setInterval(() => {
      if (document.visibilityState === 'visible' && Math.random() > 0.35) createHeart();
    }, 900);
  </script>
</body>
</html>
